<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bark Raiders</title>
  <style>
    html, body { margin: 0; min-height: 100%; background: #120e0b; color: #fff4dc; font-family: system-ui, sans-serif; }
    body { display: grid; place-items: center; }
  </style>
</head>
<body>
  <p>Opening the kennel...</p>
  <script>
    fetch('game.html')
      .then(response => {
        if(!response.ok) throw new Error('Could not load Bark Raiders.');
        return response.text();
      })
      .then(html => {
        const onboarding = '<script src="founder-onboarding.js"><\\/script>';
        document.open();
        document.write(html.replace('</body>', onboarding + '</body>'));
        document.close();
      })
      .catch(error => { document.body.textContent = error.message; });
  </script>
</body>
</html>
